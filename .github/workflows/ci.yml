name: CI — Lint & Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check src/ app/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        # Le dossier tests/ peut être absent au départ : on ignore l'erreur
        continue-on-error: true

  streamlit-smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérification syntaxique du dashboard
        run: python -m py_compile app/streamlit_app.py

      - name: Vérification import du module transfer_model
        run: python -c "import sys; sys.path.insert(0,'src'); from transfer_model import FERResNet; m = FERResNet(pretrained=False); print('FERResNet OK —', m.count_total_params(), 'paramètres')"
